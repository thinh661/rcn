# Source: rcn/templates/spark-history-server.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spark-history-server
  labels:
    helm.sh/chart: rcn-0.3.0
    app.kubernetes.io/name: RCN
    app.kubernetes.io/instance: rcn
    app.kubernetes.io/version: "main"
    app.kubernetes.io/managed-by: Helm
    component: spark-history-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: RCN
      app.kubernetes.io/instance: rcn
      component: spark-history-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: RCN
        app.kubernetes.io/instance: rcn
        component: spark-history-server
    spec:
      initContainers:
        - name: copy-s3a-jars
          image: "ghcr.io/sparklabx/kernel:latest"
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              cp /usr/local/lib/python3.11/dist-packages/pyspark/jars/hadoop-aws-3.3.4.jar /shared-jars/hadoop-aws-3.3.4.jar
              cp /usr/local/lib/python3.11/dist-packages/pyspark/jars/aws-java-sdk-bundle-1.12.262.jar /shared-jars/aws-java-sdk-bundle-1.12.262.jar
          volumeMounts:
            - name: shared-jars
              mountPath: /shared-jars
      containers:
        - name: spark-history-server
          image: "apache/spark:3.5.5"
          imagePullPolicy: IfNotPresent
          command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.history.HistoryServer"]
          ports:
            - containerPort: 18080
              name: spark-history
          env:
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: rcn-secrets
                  key: MINIO_ACCESS_KEY
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: rcn-secrets
                  key: MINIO_SECRET_KEY
            - name: MINIO_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: rcn-config
                  key: MINIO_ENDPOINT
            - name: SPARK_HISTORY_OPTS
              value: >-
                -Dspark.history.fs.logDirectory=s3a://workspace/event-logs/
                -Dspark.hadoop.fs.s3a.endpoint=$(MINIO_ENDPOINT)
                -Dspark.hadoop.fs.s3a.access.key=$(MINIO_ACCESS_KEY)
                -Dspark.hadoop.fs.s3a.secret.key=$(MINIO_SECRET_KEY)
                -Dspark.hadoop.fs.s3a.path.style.access=true
                -Dspark.history.ui.port=18080
          volumeMounts:
            - name: shared-jars
              mountPath: /opt/spark/jars/hadoop-aws-3.3.4.jar
              subPath: hadoop-aws-3.3.4.jar
            - name: shared-jars
              mountPath: /opt/spark/jars/aws-java-sdk-bundle-1.12.262.jar
              subPath: aws-java-sdk-bundle-1.12.262.jar
          resources:
            limits:
              cpu: 1000m
              memory: 1Gi
            requests:
              cpu: 100m
              memory: 512Mi
          readinessProbe:
            tcpSocket:
              port: 18080
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 18080
            initialDelaySeconds: 30
            periodSeconds: 30
      volumes:
        - name: shared-jars
          emptyDir: {}

