{{/* Only create the Secret when the user hasn't supplied an existing one. */}}
{{- if .Values.secrets.create -}}
{{- if not .Values.secrets.jwtSecretKey -}}
{{- fail "secrets.jwtSecretKey is required. Generate with: openssl rand -base64 48" -}}
{{- end -}}
{{- if not .Values.secrets.seedAdmin.password -}}
{{- fail "secrets.seedAdmin.password is required" -}}
{{- end -}}
{{- if not .Values.secrets.minio.rootPassword -}}
{{- fail "secrets.minio.rootPassword is required. Generate with: openssl rand -base64 24" -}}
{{- end -}}
{{- if and (not .Values.postgres.enabled) (not .Values.postgres.external.host) -}}
{{- fail "postgres.enabled=false → postgres.external.host is required" -}}
{{- end -}}
{{- if and (not .Values.minio.enabled) (not .Values.minio.external.endpoint) -}}
{{- fail "minio.enabled=false → minio.external.endpoint is required" -}}
{{- end -}}
{{- $pgHost := ternary "postgres" .Values.postgres.external.host .Values.postgres.enabled -}}
{{- $pgPort := ternary 5432 (.Values.postgres.external.port | int) .Values.postgres.enabled -}}
{{- $pgSSL := .Values.postgres.sslMode | default (ternary "disable" "require" .Values.postgres.enabled) -}}
{{/*
  URL-encode user and password so DSN parsing doesn't break on special
  characters in passwords ("@", ":", "/", "?", "#", "%", "[", "]"). lib/pq
  accepts percent-encoded credentials in the URI. Without this, a password
  like "prod!@#$" would silently parse the wrong '@' as host separator.
*/}}
{{- $pgUser := urlquery .Values.postgres.database.user -}}
{{- $pgPwd  := urlquery .Values.postgres.database.password -}}
{{- $pgDB   := urlquery .Values.postgres.database.name -}}
{{- $pgURL := printf "postgres://%s:%s@%s:%d/%s?sslmode=%s" $pgUser $pgPwd $pgHost (int $pgPort) $pgDB $pgSSL -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "sparklabx.secretName" . }}
  labels:
    {{- include "sparklabx.labels" . | nindent 4 }}
type: Opaque
stringData:
  JWT_SECRET_KEY: {{ .Values.secrets.jwtSecretKey | quote }}
  SEED_ADMIN_USERNAME: {{ .Values.secrets.seedAdmin.username | quote }}
  SEED_ADMIN_EMAIL: {{ .Values.secrets.seedAdmin.email | quote }}
  SEED_ADMIN_PASSWORD: {{ .Values.secrets.seedAdmin.password | quote }}
  MINIO_ROOT_USER: {{ .Values.secrets.minio.rootUser | quote }}
  MINIO_ROOT_PASSWORD: {{ .Values.secrets.minio.rootPassword | quote }}
  {{/* Backend reads MINIO_ACCESS_KEY/MINIO_SECRET_KEY (see config.go); the
       MinIO server uses MINIO_ROOT_USER/PASSWORD. They're the same credential
       under different env names — expose both so the backend's MinIO IAM
       initializes instead of reporting "MinIO is not configured". */}}
  MINIO_ACCESS_KEY: {{ .Values.secrets.minio.rootUser | quote }}
  MINIO_SECRET_KEY: {{ .Values.secrets.minio.rootPassword | quote }}
  GOOGLE_CLIENT_ID: {{ .Values.secrets.google.clientId | quote }}
  GOOGLE_CLIENT_SECRET: {{ .Values.secrets.google.clientSecret | quote }}
  MICROSOFT_CLIENT_ID: {{ .Values.secrets.microsoft.clientId | quote }}
  MICROSOFT_CLIENT_SECRET: {{ .Values.secrets.microsoft.clientSecret | quote }}
  MICROSOFT_TENANT_ID: {{ .Values.secrets.microsoft.tenantId | quote }}
  OIDC_CLIENT_SECRET: {{ .Values.sso.clientSecret | quote }}
  {{/* Connector signing key: by default the backend generates one on first boot
       and persists it in Postgres (stable across restarts and shared by all
       replicas), so nothing is needed here. Set connector.jwtPrivateKey only to
       pin your own PEM. */}}
  {{- if .Values.connector.jwtPrivateKey }}
  CONNECTOR_JWT_PRIVATE_KEY: {{ .Values.connector.jwtPrivateKey | quote }}
  {{- end }}
  POSTGRES_PASSWORD: {{ .Values.postgres.database.password | quote }}
  DATABASE_URL: {{ $pgURL | quote }}
{{- end -}}
