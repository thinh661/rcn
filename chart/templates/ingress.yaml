{{- if .Values.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "RCN.fullname" . }}
  labels:
    {{- include "RCN.labels" . | nindent 4 }}
  annotations:
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- if and .Values.ingress.tls.enabled .Values.ingress.tls.certManagerClusterIssuer }}
    cert-manager.io/cluster-issuer: {{ .Values.ingress.tls.certManagerClusterIssuer | quote }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
        {{- if .Values.sparkHistoryServer.enabled }}
        - {{ .Values.sparkHistoryServer.ingress.host | default (printf "shs.%s" .Values.ingress.host) }}
        {{- end }}
      secretName: {{ .Values.ingress.tls.secretName }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 10000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
    {{- if .Values.sparkHistoryServer.enabled }}
    - host: {{ .Values.sparkHistoryServer.ingress.host | default (printf "shs.%s" .Values.ingress.host) }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: spark-history-server
                port:
                  number: 18080
    {{- end }}
{{- end -}}
