{{- if .Values.minio.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: minio
  labels:
    {{- include "sparklabx.labels" . | nindent 4 }}
    component: minio
spec:
  clusterIP: None
  ports:
    - name: api
      port: 9000
      targetPort: 9000
    - name: console
      port: 9001
      targetPort: 9001
  selector:
    {{- include "sparklabx.selectorLabels" . | nindent 4 }}
    component: minio
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: minio
  labels:
    {{- include "sparklabx.labels" . | nindent 4 }}
    component: minio
spec:
  serviceName: minio
  replicas: 1
  selector:
    matchLabels:
      {{- include "sparklabx.selectorLabels" . | nindent 6 }}
      component: minio
  template:
    metadata:
      labels:
        {{- include "sparklabx.selectorLabels" . | nindent 8 }}
        component: minio
    spec:
      initContainers:
        - name: fix-perms
          image: busybox:1.36
          command: ["sh", "-c", "mkdir -p /data && chmod -R 777 /data"]
          volumeMounts:
            - name: data
              mountPath: /data
      containers:
        - name: minio
          image: "{{ .Values.minio.image.repository }}:{{ .Values.minio.image.tag }}"
          # MinIO official image ENTRYPOINT is docker-entrypoint.sh which
          # execs $@ — so the first arg must be the 'minio' binary, then
          # its sub-command. (RustFS used a different entrypoint and only
          # needed the sub-command; this trips you up on the swap.)
          args: ["minio", "server", "/data", "--console-address", ":9001"]
          ports:
            - containerPort: 9000
            - containerPort: 9001
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "sparklabx.secretName" . }}
                  key: MINIO_ROOT_USER
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "sparklabx.secretName" . }}
                  key: MINIO_ROOT_PASSWORD
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            {{- toYaml .Values.minio.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /minio/health/live
              port: 9000
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: 9000
            initialDelaySeconds: 30
            periodSeconds: 30
      {{- if not .Values.minio.persistence.enabled }}
      # persistence.enabled=false → emptyDir. Notebooks + datasets are lost
      # on pod restart; use only for evaluation / CI.
      volumes:
        - name: data
          emptyDir: {}
      {{- end }}
  {{- if .Values.minio.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
        {{- with .Values.minio.persistence.annotations }}
        annotations:
          {{- toYaml . | nindent 10 }}
        {{- end }}
      spec:
        accessModes:
          {{- toYaml .Values.minio.persistence.accessModes | nindent 10 }}
        {{- with .Values.minio.persistence.storageClass }}
        storageClassName: {{ . | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.minio.persistence.size | quote }}
  {{- end }}
{{- end }}
