apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rcn
  labels:
    helm.sh/chart: rcn-0.3.0
    app.kubernetes.io/name: RCN
    app.kubernetes.io/instance: rcn
    app.kubernetes.io/version: "main"
    app.kubernetes.io/managed-by: Helm
  annotations:
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - rcn.lakehouse.local
        - shs.rcn.lakehouse.local
      secretName: rcn-tls
  rules:
    - host: rcn.lakehouse.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 10000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
    - host: shs.rcn.lakehouse.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: spark-history-server
                port:
                  number: 18080
