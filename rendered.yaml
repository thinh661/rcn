# Source: rcn/templates/backend.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  labels:
    helm.sh/chart: rcn-0.3.0
    app.kubernetes.io/name: RCN
    app.kubernetes.io/instance: rcn
    app.kubernetes.io/version: "main"
    app.kubernetes.io/managed-by: Helm
    component: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: RCN
      app.kubernetes.io/instance: rcn
      component: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: RCN
        app.kubernetes.io/instance: rcn
        component: backend
    spec:
      serviceAccountName: rcn-backend
      containers:
        - name: backend
          image: "ghcr.io/sparklabx/backend:latest"
          imagePullPolicy: Always
          ports:
            - containerPort: 10000
          envFrom:
            - configMapRef:
                name: rcn-config
            - secretRef:
                name: rcn-secrets
          env:
            # Tell the in-cluster client which namespace to spawn kernels in.
            - name: KERNEL_POD_NAMESPACE
              value: "default"
            # Per-user kernel pod resources. See values.yaml -> kernel.resources.
            - name: KERNEL_POD_CPU_REQUEST
              value: "500m"
            - name: KERNEL_POD_MEMORY_REQUEST
              value: "1Gi"
            - name: KERNEL_POD_CPU_LIMIT
              value: "2000m"
            - name: KERNEL_POD_MEMORY_LIMIT
              value: "4Gi"
          resources:
            limits:
              cpu: 2000m
              memory: 1Gi
            requests:
              cpu: 200m
              memory: 256Mi
          readinessProbe:
            tcpSocket:
              port: 10000
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 10000
            initialDelaySeconds: 30
            periodSeconds: 30

