name: Feature request
description: Suggest a new capability or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: use-case
    attributes:
      label: Use case
      description: What are you trying to accomplish? Describe the problem before the solution.
      placeholder: As a [role], I want to [...] so that [...]
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would the feature look like? UI sketches, API shape, config keys, etc.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other approaches did you consider, and why did you reject them?

  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: Does this touch backend, frontend, kernel, k8s manifests, docs? Any breaking changes?
