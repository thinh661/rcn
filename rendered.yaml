# Source: rcn/templates/minio.yaml
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: minio
  labels:
    helm.sh/chart: rcn-0.3.0
    app.kubernetes.io/name: RCN
    app.kubernetes.io/instance: rcn
    app.kubernetes.io/version: "main"
    app.kubernetes.io/managed-by: Helm
    component: minio
spec:
  serviceName: minio
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: RCN
      app.kubernetes.io/instance: rcn
      component: minio
  template:
    metadata:
      labels:
        app.kubernetes.io/name: RCN
        app.kubernetes.io/instance: rcn
        component: minio
    spec:
      initContainers:
        - name: fix-perms
          image: busybox:1.36
          command: ["sh", "-c", "mkdir -p /data && chmod -R 777 /data"]
          volumeMounts:
            - name: data
              mountPath: /data
      containers:
        - name: minio
          image: "minio/minio:latest"
          # MinIO official image ENTRYPOINT is docker-entrypoint.sh which
          # execs $@ — so the first arg must be the 'minio' binary, then
          # its sub-command. (RustFS used a different entrypoint and only
          # needed the sub-command; this trips you up on the swap.)
          args: ["minio", "server", "/data", "--console-address", ":9001"]
          ports:
            - containerPort: 9000
            - containerPort: 9001
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: rcn-secrets
                  key: MINIO_ROOT_USER
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rcn-secrets
                  key: MINIO_ROOT_PASSWORD
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            limits:
              cpu: 2000m
              memory: 4Gi
            requests:
              cpu: 500m
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /minio/health/live
              port: 9000
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: 9000
            initialDelaySeconds: 30
            periodSeconds: 30
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: "50Gi"

