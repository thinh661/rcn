{{- $minioEndpoint := ternary "http://minio:9000" .Values.minio.external.endpoint .Values.minio.enabled -}}
{{- $appURL := "" -}}
{{- if .Values.ingress.enabled -}}
{{- $appURL = printf "%s://%s" (ternary "https" "http" .Values.ingress.tls.enabled) .Values.ingress.host -}}
{{- end -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "sparklabx.fullname" . }}-config
  labels:
    {{- include "sparklabx.labels" . | nindent 4 }}
data:
  # DATABASE_URL contains the Postgres password and lives in the Secret
  # (see secret.yaml). Non-sensitive Postgres fields stay here so the
  # bootstrap initContainer can read them when enabled=true.
  POSTGRES_DB: {{ .Values.postgres.database.name | quote }}
  POSTGRES_USER: {{ .Values.postgres.database.user | quote }}
  MINIO_ENDPOINT: {{ $minioEndpoint | quote }}
  MINIO_WORKSPACE_BUCKET: {{ .Values.minio.bucket | quote }}
  KERNEL_MODE: {{ .Values.kernelMode | quote }}
  KERNEL_POD_IMAGE: "{{ .Values.image.kernel.repository }}:{{ .Values.image.kernel.tag }}"
  KERNEL_POD_IDLE_MINUTES: {{ .Values.kernel.idleMinutes | quote }}
  KERNEL_POD_MAX_TOTAL: {{ .Values.kernel.maxTotal | quote }}
  CORS_ORIGINS: {{ .Values.backend.cors.origins | quote }}
  LOG_LEVEL: {{ .Values.backend.logLevel | quote }}
  ENVIRONMENT: "production"
  SERVICE_PORT: "10000"
  # Generic OIDC SSO (clientSecret lives in the Secret). redirectUrl /
  # postLoginRedirect default to the ingress host when left blank.
  OIDC_ISSUER_URL: {{ .Values.sso.issuerUrl | quote }}
  OIDC_CLIENT_ID: {{ .Values.sso.clientId | quote }}
  OIDC_SCOPES: {{ .Values.sso.scopes | quote }}
  OIDC_PROVIDER_NAME: {{ .Values.sso.providerName | quote }}
  OIDC_REDIRECT_URL: {{ .Values.sso.redirectUrl | default (ternary (printf "%s/api/v1/auth/oidc/callback" $appURL) "" (ne $appURL "")) | quote }}
  OIDC_POST_LOGIN_REDIRECT: {{ .Values.sso.postLoginRedirect | default $appURL | quote }}
  OIDC_INTERNAL_ISSUER_URL: {{ .Values.sso.internalIssuerUrl | quote }}
  # Connectors (Trino/Postgres/MySQL) are added at runtime in the UI and stored in
  # the DB. CONNECTOR_ISSUER is the `iss` of the app-minted tokens; it must match
  # each connector's required-issuer (e.g. Trino's http-server.authentication.jwt.required-issuer).
  CONNECTOR_ISSUER: {{ .Values.connector.issuer | quote }}
  # Backend URL reachable FROM kernel pods (in-session OIDC token refresh). The
  # backend Service is named "backend" in this chart, so the config.go default
  # (sparklabx-backend) would be wrong — set the in-cluster FQDN explicitly.
  KERNEL_CALLBACK_URL: {{ printf "http://backend.%s.svc.cluster.local:10000" .Release.Namespace | quote }}
