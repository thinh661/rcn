data:
  # DATABASE_URL contains the Postgres password and lives in the Secret
  # (see secret.yaml). Non-sensitive Postgres fields stay here so the
  # bootstrap initContainer can read them when enabled=true.
  POSTGRES_DB: "RCN"
  POSTGRES_USER: "RCN"
  MINIO_ENDPOINT: "http://minio:9000"
  MINIO_WORKSPACE_BUCKET: "workspace"
  KERNEL_MODE: "k8s_per_user"
  KERNEL_POD_IMAGE: "ghcr.io/sparklabx/kernel:latest"
  KERNEL_POD_IDLE_MINUTES: "30"
  KERNEL_POD_MAX_TOTAL: "50"
  CORS_ORIGINS: "https://rcn.lakehouse.local"
  LOG_LEVEL: "info"
  ENVIRONMENT: "production"
  SERVICE_PORT: "10000"
  # Generic OIDC SSO (clientSecret lives in the Secret). redirectUrl /
  # postLoginRedirect default to the ingress host when left blank.
  OIDC_ISSUER_URL: ""
  OIDC_CLIENT_ID: ""
  OIDC_SCOPES: "openid email profile"
  OIDC_PROVIDER_NAME: "SSO"
  OIDC_REDIRECT_URL: "https://rcn.lakehouse.local/api/v1/auth/oidc/callback"
  OIDC_POST_LOGIN_REDIRECT: "https://rcn.lakehouse.local"
  OIDC_INTERNAL_ISSUER_URL: ""
  # Connectors (Trino/Postgres/MySQL) are added at runtime in the UI and stored in
  # the DB. CONNECTOR_ISSUER is the `iss` of the app-minted tokens; it must match
  # each connector's required-issuer (e.g. Trino's http-server.authentication.jwt.required-issuer).
  CONNECTOR_ISSUER: "RCN"
  # Backend URL reachable FROM kernel pods (in-session OIDC token refresh). The
  # backend Service is named "backend" in this chart, so the config.go default
  # (RCN-backend) would be wrong — set the in-cluster FQDN explicitly.
  KERNEL_CALLBACK_URL: "http://backend.default.svc.cluster.local:10000"

