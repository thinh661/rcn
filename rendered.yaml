# Source: rcn/templates/postgres.yaml
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  labels:
    helm.sh/chart: rcn-0.3.0
    app.kubernetes.io/name: RCN
    app.kubernetes.io/instance: rcn
    app.kubernetes.io/version: "main"
    app.kubernetes.io/managed-by: Helm
    component: postgres
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: RCN
      app.kubernetes.io/instance: rcn
      component: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: RCN
        app.kubernetes.io/instance: rcn
        component: postgres
    spec:
      # postgres alpine image runs as uid 70 — fix ownership before the
      # main container starts (works on both fresh PVCs and reused ones).
      initContainers:
        - name: fix-perms
          image: busybox:1.36
          command: ["sh", "-c", "mkdir -p /var/lib/postgresql/data && chown -R 70:70 /var/lib/postgresql/data && chmod 700 /var/lib/postgresql/data"]
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      containers:
        - name: postgres
          image: "postgres:16-alpine"
          envFrom:
            - configMapRef:
                name: rcn-config
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rcn-secrets
                  key: POSTGRES_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          resources:
            limits:
              cpu: 2000m
              memory: 2Gi
            requests:
              cpu: 100m
              memory: 256Mi
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "RCN"]
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "RCN"]
            initialDelaySeconds: 30
            periodSeconds: 30
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: "10Gi"

