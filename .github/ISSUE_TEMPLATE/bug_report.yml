name: Bug report
description: Something is broken or not behaving as documented
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill in
        as much of the context below as you can — the more we know, the
        faster we can reproduce.

        **Security vulnerabilities should NOT be filed here.**
        Please follow the process in [SECURITY.md](../../SECURITY.md).

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the unexpected behavior.
      placeholder: When I do X, the backend returns 500 instead of …
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: The smallest set of steps that triggers the bug.
      placeholder: |
        1. `./quickstart.sh`
        2. Log in as admin
        3. Open Notebook → run cell `…`
        4. Observe …
    validations:
      required: true

  - type: dropdown
    id: kernel-mode
    attributes:
      label: KERNEL_MODE
      options:
        - shared
        - docker_per_user
        - k8s_per_user
        - not applicable
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version / commit
      description: Output of `git rev-parse --short HEAD` or the image tag you pulled.
    validations:
      required: true

  - type: textarea
    id: env
    attributes:
      label: Environment
      description: OS, Docker / Kubernetes version, anything else relevant.
      placeholder: |
        - OS: Ubuntu 22.04
        - Docker: 27.0.3
        - Browser: Chrome 130

  - type: textarea
    id: logs
    attributes:
      label: Logs / error output
      description: Relevant backend / kernel / browser console logs. Redact secrets.
      render: shell
