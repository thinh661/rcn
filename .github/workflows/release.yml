name: Build & publish images

# Build all three images (backend, frontend, kernel) and push to ghcr.io.
# Triggers:
#   - push to main      → :main, :latest, :sha-<short> tags
#   - manual dispatch   → all images rebuilt (useful for cache-bust /
#                         re-publishing :latest after a broken image)

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}   # "sparklabx" when run in the org

jobs:
  # Compute the build matrix dynamically so a backend-only commit doesn't
  # trigger an 8-minute kernel rebuild. Tags and workflow_dispatch always
  # produce the full set (release / manual recovery).
  #
  # GitHub Actions does NOT allow `matrix` in a job-level `if:` (matrix is
  # expanded after `if:` is evaluated), so we can't filter via `if:` —
  # instead we emit the matrix array itself with only the images we want.
  detect:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.compute.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: changes
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'
            kernel:
              - 'kernel/**'
      - id: compute
        env:
          BACKEND:    ${{ steps.changes.outputs.backend }}
          FRONTEND:   ${{ steps.changes.outputs.frontend }}
          KERNEL:     ${{ steps.changes.outputs.kernel }}
          ALWAYS_ALL: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/') }}
        run: |
          items=()
          if [[ "$ALWAYS_ALL" == "true" || "$BACKEND" == "true" ]]; then
            items+=('{"image":"backend","context":".","dockerfile":"backend/Dockerfile"}')
          fi
          if [[ "$ALWAYS_ALL" == "true" || "$FRONTEND" == "true" ]]; then
            items+=('{"image":"frontend","context":"./frontend","dockerfile":"./frontend/Dockerfile"}')
          fi
          if [[ "$ALWAYS_ALL" == "true" || "$KERNEL" == "true" ]]; then
            items+=('{"image":"kernel","context":"./kernel","dockerfile":"./kernel/Dockerfile"}')
          fi
          IFS=,
          echo "matrix=[${items[*]}]" >> "$GITHUB_OUTPUT"

  build:
    name: ${{ matrix.image }}
    needs: detect
    if: ${{ needs.detect.outputs.matrix != '[]' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.detect.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.image }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') }}
            type=ref,event=branch
            type=ref,event=tag
            type=sha,format=short

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          # kernel is the heaviest (PySpark JARs); amd64-only saves ~10 min per run.
          # Override per-image if you need multi-arch.
          platforms: linux/amd64${{ matrix.image == 'kernel' && '' || ',linux/arm64' }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Inline cache + GitHub Actions cache for fast rebuilds across runs.
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
          build-args: |
            VITE_GOOGLE_CLIENT_ID=${{ vars.VITE_GOOGLE_CLIENT_ID }}
            VITE_MICROSOFT_CLIENT_ID=${{ vars.VITE_MICROSOFT_CLIENT_ID }}
            VITE_MICROSOFT_TENANT_ID=${{ vars.VITE_MICROSOFT_TENANT_ID }}
