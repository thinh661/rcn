# Source: rcn/templates/backend.yaml
# RBAC only needed when kernelMode=k8s_per_user; the backend spawns and
# reaps per-user kernel pods directly via the k8s API.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: rcn-backend
  labels:
    helm.sh/chart: rcn-0.3.0
    app.kubernetes.io/name: RCN
    app.kubernetes.io/instance: rcn
    app.kubernetes.io/version: "main"
    app.kubernetes.io/managed-by: Helm
    component: backend
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "create", "delete", "deletecollection"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "create", "delete"]
  # Read per-user pod CPU/memory for the Resource Usage widget. Requires
  # metrics-server installed in the cluster; without it the widget hides.
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods"]
    verbs: ["get", "list"]
  # Spark Operator CRD — batch job submission via SparkApplication
  - apiGroups: ["sparkoperator.k8s.io"]
    resources: ["sparkapplications"]
    verbs: ["get", "list", "watch", "create", "delete", "patch"]
  # Spark Operator CRD — scheduled batch jobs via ScheduledSparkApplication
  - apiGroups: ["sparkoperator.k8s.io"]
    resources: ["scheduledsparkapplications"]
    verbs: ["get", "list", "watch", "create", "delete", "patch", "update"]
