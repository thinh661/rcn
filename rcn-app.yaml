apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rcn
  namespace: argocd
spec:
  project: rcn
  source:
    repoURL: 'https://github.com/thinh661/rcn.git'
    targetRevision: HEAD
    path: chart
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: rcn
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
