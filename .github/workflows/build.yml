# Build & Push Docker Images
#
# On push to main: builds backend, frontend, and kernel images via Docker
# Buildx (linux/amd64 + linux/arm64) and pushes them to GHCR with
# :latest + :sha-<short> tags.
#
# On PRs: builds images without pushing (verifies the Dockerfiles compile)
# and runs Go lint/test for backend changes.

name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [dev, test, main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

permissions:
  contents: read
  packages: write

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      backend:  ${{ steps.f.outputs.backend }}
      frontend: ${{ steps.f.outputs.frontend }}
      kernel:   ${{ steps.f.outputs.kernel }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: f
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'
            kernel:
              - 'kernel/**'

  # --- BACKEND: Go lint, test, and binary build ---------------------------
  backend-go:
    name: Backend (Go)
    needs: detect
    if: needs.detect.outputs.backend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - run: go mod download
      - name: Vet
        run: go vet ./...
      - name: Build binary
        run: go build -o /dev/null ./cmd/server
      - name: Test
        run: go test ./...
      - name: Vulnerability scan
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
        continue-on-error: true

  # --- DOCKER IMAGES: build (and push on main) ----------------------------
  docker:
    name: Docker image (${{ matrix.image }})
    needs: detect
    # Always run on main (full publish); on PRs only if paths detected
    if: >
      github.ref == 'refs/heads/main' ||
      needs.detect.outputs.backend == 'true' ||
      needs.detect.outputs.frontend == 'true' ||
      needs.detect.outputs.kernel == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: backend
            context: .
            dockerfile: backend/Dockerfile
            build_args: ""
            # Single-arch for now (QEMU arm64 causes buildx failures)
            platforms: linux/amd64
          - image: frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
            build_args: |
              VITE_GOOGLE_CLIENT_ID=${{ vars.VITE_GOOGLE_CLIENT_ID }}
              VITE_MICROSOFT_CLIENT_ID=${{ vars.VITE_MICROSOFT_CLIENT_ID }}
              VITE_MICROSOFT_TENANT_ID=${{ vars.VITE_MICROSOFT_TENANT_ID }}
            # Multi-arch for frontend (static assets)
            platforms: linux/amd64,linux/arm64
          - image: kernel
            context: ./kernel
            dockerfile: ./kernel/Dockerfile
            build_args: ""
            # Kernel is heavy (PySpark JARs) — amd64 only to save ~10 min
            platforms: linux/amd64

    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.image }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,format=short,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=pr
          flavor: |
            latest=false

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platforms }}
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
          build-args: ${{ matrix.build_args }}
